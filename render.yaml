databases:
  - name: atmu-smart-unilibrary-db
    plan: basic-256mb
    region: frankfurt
    databaseName: unilibrary
    user: unilibrary
    postgresMajorVersion: "17"
    ipAllowList: []

services:
  - type: web
    name: atmu-smart-unilibrary-enterprise
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm install && npm run prisma:generate:postgres && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: unilibrary-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: lax
      - key: DATABASE_URL
        fromDatabase:
          name: atmu-smart-unilibrary-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_SIZE
        value: 10485760
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        sync: false
